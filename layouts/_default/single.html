{{- define "main" }}

<div class="post-layout">
  <aside class="post-sidebar-left">
    <nav class="post-sidenav" id="post-sidenav">
      <div class="sidenav-title">本页速览</div>
      <ul id="sidenav-list"></ul>
    </nav>
  </aside>

  <article class="post-single">
    <header class="post-header">
      <h1 class="post-title">{{ .Title }}</h1>
    </header>

    <div class="post-content">
      {{- .Content }}
    </div>
  </article>

  <aside class="post-sidebar-right">
    {{- if .TableOfContents }}
    <details open class="post-toc">
      <summary class="toc-title">目录</summary>
      <div class="toc-content">
        {{- .TableOfContents }}
      </div>
    </details>
    {{- end }}
  </aside>
</div>

<script>
(function() {
  var h2s = document.querySelectorAll('.post-content h2');
  var list = document.getElementById('sidenav-list');
  if (!list || !h2s.length) return;
  h2s.forEach(function(h) {
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.textContent = h.textContent.replace(/^[\d、\s🧊🔥🧠📦🌐]+/, '').trim();
    a.href = '#' + h.id;
    a.className = 'sidenav-link';
    li.appendChild(a);
    list.appendChild(li);
  });
})();
</script>

{{- end }}
