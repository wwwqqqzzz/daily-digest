{{- define "main" }}

<section class="post-header-bar">
  <time class="post-header-date">{{ .Date.Format "2006年01月02日" }}</time>
  <nav class="post-header-nav">
    <a href="{{ "/" | relURL }}">首页</a>
    <a href="{{ "/archive/" | relURL }}">归档</a>
  </nav>
</section>

<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">{{ .Title }}</h1>
  </header>

  <div class="post-content">
    {{- .Content }}
  </div>
</article>

{{- end }}
