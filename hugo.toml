baseURL = "https://wwwqqqzzz.github.io/daily-digest/"
languageCode = "zh-cn"
title = "简讯"
theme = "PaperMod"
enableEmoji = true

[pagination]
  pagerSize = 10

[markup.goldmark.renderer]
  unsafe = true

[params]
  defaultTheme = "light"
  disableThemeToggle = false
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = false
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  UseHugoToc = true
  disableScrollToTop = false

  [params.homeInfoParams]
    Title = "简讯"
    Content = ""

  [params.profileMode]
    enabled = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/wwwqqqzzz"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    linkFullImages = true

  mainSections = ["posts"]

[menu]
  [[menu.main]]
    identifier = "archive"
    name = "归档"
    url = "/archive/"
    weight = 10
