baseURL = "https://wwwqqqzzz.github.io/daily-digest/"
languageCode = "zh-cn"
title = "信息差日报"
theme = "PaperMod"
enableEmoji = true

[pagination]
  pagerSize = 10

[markup.goldmark.renderer]
  unsafe = true

[params]
  defaultTheme = "light"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowWordCount = false
  ShowRssButtonInSectionTermList = false
  UseHugoToc = true
  disableScrollToTop = false

  [params.homeInfoParams]
    Title = "信息差日报"
    Content = "每天 8 点，一篇解决你的信息差。"

  [params.profileMode]
    enabled = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/wwwqqqzzz"

  [[params.socialIcons]]
    name = "rss"
    url = "/index.xml"

  [params.cover]
    linkFullImages = true

[menu]
  [[menu.main]]
    identifier = "archive"
    name = "归档"
    url = "/archive/"
    weight = 10

  [[menu.main]]
    identifier = "tags"
    name = "标签"
    url = "/tags/"
    weight = 20

[taxonomies]
  tag = "tags"
