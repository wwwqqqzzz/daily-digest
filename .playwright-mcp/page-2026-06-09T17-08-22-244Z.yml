          - blockquote [ref=e147]:
            - paragraph [ref=e148]: "[!tip] 简介 免费的职位发布 API，开发者可以集成招聘数据到自己的应用中。"
          - paragraph [ref=e149]: 每个做招聘相关应用的开发者都需要职位数据。接入 Indeed、LinkedIn、Glassdoor 的官方 API 要么贵（Indeed 的 CPC 模型）、要么申请流程漫长（LinkedIn 的 Partnership 审核需要几周甚至数月）、要么限制重重（返回字段有限）。Job Postings API 走的是免费路线——聚合多个来源的职位信息，通过一个统一的 REST API 输出。
          - paragraph [ref=e150]: 免费层对个人开发者和初创公司够用。商业模式的猜测：可能通过流量变现、高级查询收费、或者嵌入招聘广告。跟去年的 OpenJobAPI 和 Jooble API 定位接近，差异没说清楚。文档是否完善、数据更新频率、支持的国家和语言——这些决定 API 质量的关键信息在产品页上找不到。
