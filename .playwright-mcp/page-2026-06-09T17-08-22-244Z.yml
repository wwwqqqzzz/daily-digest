          - blockquote [ref=e128]:
            - paragraph [ref=e129]: "[!example] 简介 跨设备密码管理和安全共享工具，端到端加密，主打\"共享\"这个一直被忽视的场景。"
          - paragraph [ref=e130]: 密码管理器这个品类已经非常拥挤了——1Password、Bitwarden、Dashlane、Keeper、NordPass、iCloud Keychain……每个都有自己的忠实用户群。但"安全共享"这个场景在整个密码管理器品类里一直做得不好。给家人分享 Wi-Fi 密码、给同事分享登录凭证、给伴侣分享流媒体账号——现有方案要么太复杂（需要对方也装同一个密码管理器），要么不够安全（明文发微信），要么功能藏得太深（1Password 的共享 vault 设置流程长达 5 步）。
          - paragraph [ref=e131]: CabinLink 瞄准的就是这个缝。端到端加密是所有密码管理器的基操，真正的差异化在于共享流程能做得多流畅。如果还是"生成一个链接 → 复制 → 粘贴给对方 → 对方打开 → 验证身份 → 下载应用"那套，那跟已有的就没区别。如果真能做到"一条链接、对方点开即用、看完自动销毁"，那才有竞争力。定价和具体实现方式未公开，现阶段的讨论只能停留在概念层面。
