          - paragraph [ref=e84]: 从 OpenAI Whisper 开源之后，本地语音识别这个品类一直在增长。macOS 上已经有不少同类工具了：MacWhisper、SuperWhisper、Whisper Transcription——各自在 UI 细节和价格上做差异化。
          - paragraph [ref=e85]: Wave 选在 WWDC 期间发布，时机的选择比产品本身更值得注意。Apple 正在全力推 on-device AI，用户对"数据不上云"的预期在变成默认要求。在这个背景下，Wave 的"本地运行不出网"不是一个差异化卖点，而是一张入场券——你不能本地处理，用户根本不会看你第二眼。
          - paragraph [ref=e86]: 遗憾的是 Wave 的产品页面没有说清楚跟同类工具的差异点。识别准确率？支持的语言数量？实时转写还是先录后转？API 接口是否开放？这些都没提。对于一个竞争激烈、功能同质化严重的品类，不说清楚差异就等于没有存在理由。
