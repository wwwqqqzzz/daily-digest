          - paragraph [ref=e110]: iCloud 不够用？Google Photos 快满了？Smmall Cloud 的卖点很简单：你的手机就是服务器。照片拍完直接存在本机，通过 P2P 在其他设备上访问。不需要订阅、不需要上传到别人的服务器、数据量完全不设限——你的手机能存多少就能用多少。
          - paragraph [ref=e111]: 在隐私意识越来越强的市场环境下，这种"零信任"方案的吸引力在上升。用户不用再担心 iCloud 泄露、Google Photos 的 AI 训练条款、Dropbox 的定价上涨。代价很实在：手机存储空间有限（128GB 起步？还是 512GB 才够用？没说明），而且手机没电或不在线时文件就无法访问。
          - paragraph [ref=e112]: 同类产品有 PhotoSync（Wi-Fi 直传）、Syncthing（开源 P2P 同步）、Fileloupe 等。Smmall Cloud 的差异化没说清楚，而且只支持 iOS——如果你的工作流跨平台，它就不够用。定价未公开。
