          - heading "一、🧊 冷知识" [level=2] [ref=e32]
          - heading "JavaScript 的 setTimeout(fn, 0) 不是\"立即执行\"" [level=3] [ref=e33]
          - paragraph [ref=e34]:
            - text: 你写
            - code [ref=e35]: setTimeout(() => console.log("B"), 0)
            - text: ，它不会在下一行之前执行。它会排在任务队列末尾，等当前执行栈清空后才轮到。
          - paragraph [ref=e36]:
            - text: 这个机制来自浏览器的事件循环（event loop）。事件循环的核心是一个无限循环：取出一个任务 → 执行 → 取出下一个任务。
            - code [ref=e37]: setTimeout
            - text: 不是"定时执行"，而是"把任务插入队列，等到时间到了就排进队"。所以 setTimeout 保证的是至少等 N 毫秒，不是恰好 N 毫秒后执行。
          - paragraph [ref=e38]:
            - text: MDN 还写了几个有意思的细节：嵌套超过 5 层时，最小延迟被强制设为 4ms（为了防止开发者恶意阻塞主线程）；页面在后台标签页时会被节流到 1000ms（为了省电）。最常用的是
            - code [ref=e39]: setTimeout(fn, 0)
            - text: ——你希望"等当前代码跑完再执行"。这不等于多线程，只是利用了单线程的排队机制。
          - paragraph [ref=e40]:
            - text: Brendan Eich 管这个叫 “least necessary lying” —— 为了让开发者不至于用死循环"等一会儿"，语言设计者给出了最小的谎。你写的每一行
            - code [ref=e41]: setTimeout(fn, 0)
            - text: 背后，都有一个浏览器在替你掩饰这个谎言。
