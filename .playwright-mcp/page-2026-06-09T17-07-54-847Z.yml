            - paragraph [ref=e49]: "[!example] 简介 把团队知识变成交互式 AI 课程的自动化工具，几分钟出课，含自适应学习、模拟操作、学员分析。"
          - paragraph [ref=e50]: 企业培训市场的痛点一直很统一：花几周做一套课程，三个月后就过时了。Honen 的解决思路是直接跳过"制作"阶段——你把文档、会议录音、kickoff 视频丢给它，它自己抽知识点出课程。
          - paragraph [ref=e51]: 这里面真正有意思的不是"AI 出题"，而是自适应引擎。学员答完一题后，下一题的难度和主题会根据回答自动调整，有点像 Duolingo 但面向企业场景。模拟模块目前覆盖销售对话、客服场景这些高频用例——属于能直接上手的场景，不需要你的培训部门额外配置。
          - paragraph [ref=e52]: 跟传统的 LMS（如 Moodle、Articulate）比起来，Honen 的优势在速度，劣势在深度定制。如果你的公司有非常具体的内训 SOP 或者特殊的合规要求，Honen 目前的自定义程度可能不够。价格尚未公开，但以这类 AI 培训工具的定价惯例来看，应该按团队规模按月订阅。对于 20-100 人的中小团队来说，这可能是目前最省事的 onboarding 方案。
