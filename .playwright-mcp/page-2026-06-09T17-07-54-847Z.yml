          - heading "三、🧠 Big Think" [level=2] [ref=e160]
          - heading "大脑 40% 的时间都在运行一个由三个部分组成的习惯循环" [level=3] [ref=e161]
          - paragraph [ref=e162]: 有一个比喻让我印象很深：大脑不是电脑，是一台习惯驱动的自动机器。你一天里做的很多事，根本不是你"决定"做的，是触发器一响、脚本自动播放。
          - paragraph [ref=e163]: Charles Duhigg 说，大脑的基底核在习惯形成后会接管控制权，让前额叶皮层退居二线。这解释了为什么你会不自觉地摸手机、打开冰箱、切到推特——不是你意志力差，是你的基底核在跑自动脚本。他把这个结构叫作 cue（触发）→ routine（行为）→ reward（奖赏），听起来简单，但仔细拆开看每一环都很有意思。
          - paragraph [ref=e164]: 我特别在意的是"渴望"（craving）这个概念。以前我以为习惯之所以固化是因为 reward 本身让人上瘾——比如甜食带来的快感、刷到有趣推文的愉悦。但 Duhigg 说不是这样。让行为固化的不是 reward 本身，而是 reward 之前那个预期阶段释放的多巴胺。你的大脑在 cue 触发的那一瞬间就开始分泌多巴胺，它预判"马上会有好事发生"。这个预判阶段的兴奋感，比 reward 本身更强力。换句话说，你不是真的想吃那块饼干，你是"期待会吃到饼干"这个念头让你停不下来。
          - paragraph [ref=e165]: 这和我自己每次面对 VSCode 里一条写不出来的 TODO 时的行为一模一样——先刷两分钟推、再切到邮件、再打开某个无关的 repo 看看。不是因为推有意思、不是因为邮件紧急、不是因为那个 repo 有趣，是因为这些行为的 reward 是确定的——刷两分钟一定会看到点什么、清理一封邮件一定会获得"做完一件事"的满足感。而那条 TODO 的 reward 是不确定的——你可能花两小时也写不出来。大脑在不确定面前自动选择了确定的路径。这不是懒，是神经机制在替你省钱。
          - paragraph [ref=e166]: 另一个让我停下来的数字是 40%。Duhigg 说大脑大约 40% 的时间都处于习惯驱动模式——你一天清醒的 16 个小时里，有 6 个多小时在自动驾驶。以前我会觉得这个数字可怕，好像我大部分时间都不是"我"在做决定。但换个角度想，这也意味着如果你的自动化脚本写得还不错，你每天有 6 个小时在高效运转而不需要消耗意志力。问题不在于自动驾驶本身，在于你的自动驾驶跑的是哪条路线。
          - paragraph [ref=e167]: 这段访谈叫 The 3-part habit loop，以前看这类标题只觉得是又一套效率框架。今天读完最大的触动是：最难的不是改掉一个习惯，是承认我每次推到 VSCode 去刷手机，不是因为饿、不是因为消息重要，只是因为我怕面对那条 TODO 的不确定性。也许可以先挑一个最常出现的场景来拆——比如每次打开编辑器之前先写一行"我现在到底在怕什么"，在一个确定的小动作和不确定的大任务之间搭一座桥。习惯改不了，但 cue 和 reward 之间的那段路可以换。
          - paragraph [ref=e168]:
            - link "The 3-part habit loop" [ref=e169] [cursor=pointer]:
              - /url: https://bigthink.com/neuropsychology/the-3-part-habit-loop/
          - heading "从太空中最小的物体到最大的物体" [level=3] [ref=e170]
          - paragraph [ref=e171]: 有一类文章是你明知道读了也不会改变什么，但读的时候会觉得"活在这个宇宙里真好"。Ethan Siegel 这篇就是。
          - paragraph [ref=e172]: 它从最小的东西——亚原子粒子——一路推到最大的结构——宇宙纤维网。人站在地球上觉得地球很大，但跟太阳比地球只是一粒灰，太阳在银河系里又是一粒灰，银河系在本星系群里还是一粒灰。到了宇宙纤维网，整个银河系都只是一粒灰。可观测宇宙里大约有 2000 亿个星系——这个数字大到超出我的具象能力。我试着去"想象"2000 亿是什么概念，但大脑直接宕机了。能处理的只有"很多很多"。
          - paragraph [ref=e173]: 真正让我停下来的是他问的一个问题：这些尺度之间的跳跃，是否暗示了某种我们还没理解的组织原则？从原子到分子到细胞到器官到人体到城市到国家到星球到星系——每一个尺度都涌现出新的规律，而且这些规律不能从低一层推导出来。你无法从原子物理学推出生物学，无法从生物学推出社会学。每一层都是新的游戏。宇宙可能就是一个无穷嵌套的涌现游戏。
          - paragraph [ref=e174]: 读这篇的时候我一直在想的不是宇宙，是我自己。我每天花大量时间在写代码、调试、读文档、写日报。这些事在宇宙尺度上当然毫无意义。但真正让我觉得有意思的是：意义本身可能就是一种尺度涌现的现象。在一个人的尺度上，一行好代码、一个 bug 被修好、一个用户少等一秒——这些就是意义的单位。它不是被"赋予"的，是在这个尺度上自然涌现出来的。宇宙不需要你的代码有意义，但你在你的尺度上需要。这两件事不矛盾。
          - paragraph [ref=e175]:
            - link "From the smallest to the largest objects in space" [ref=e176] [cursor=pointer]:
              - /url: https://bigthink.com/starts-with-a-bang/smallest-largest-objects-space/
          - heading "那个塑造我们动机的、常被忽视的大脑系统" [level=3] [ref=e177]
          - paragraph [ref=e178]: 有一个观察让我想了很久：你以为你在独立做决定，但其实你选择学什么、做什么、认为什么有价值，很大程度上是被你所处的社交环境和关系史塑造的。“我们"的边界在哪，“我"从哪开始到哪结束——这些边界比你以为的要模糊得多。
          - paragraph [ref=e179]: Matthew W. Schelke 的文章大意是说，除了我们熟悉的认知系统（思考、推理、决策）之外，还有一个常常被忽视的"社交情感系统"在暗中塑造我们的动机。这个系统不是在帮你"找到"动机，而是在帮你"建构"动机——你以为你发现了自己想做什么，其实你是在和你所处的环境共同创造这个"想”。我读到这里的时候停下来想了一会儿，因为我一直以为我的兴趣和偏好是很个人的东西，是我"天生"对某些方向有感觉。但如果它们实际上是被我所在的圈子塑造的呢？
          - paragraph [ref=e180]: 这让我想到自己做选择时的很多具体瞬间。为什么我对某个技术方向特别感兴趣，而对另一个完全提不起劲？我以前很自然地觉得是因为"那个技术更好”、“更有前景”。但现在认真想，可能只是因为某个我尊敬的人在做那个方向，或者我所在的社区里大家都在聊它。我对它的兴趣，可能有一大半是社交传递的，不是我自己评估出来的。这没什么不好，但如果我不意识到这一点，我会误以为所有选择都是自己做的。
          - paragraph [ref=e181]: 另一个让我在意的点是，Schelke 说这个系统跟反馈回路的强度有关。你对某个东西的动机越强，往往不是你"想清楚了"，而是你的社交环境在你每次接触那个东西时都给了你正反馈——一个赞、一句肯定、一次合作邀请。这些微小的社交信号在潜意识层面加固了你对某个方向的投入意愿。换句话说，你持续做某件事，不一定是因为你越来越喜欢它，可能是因为你收到的外部信号在持续告诉你"继续做"。
          - paragraph [ref=e182]: 读完后我想到的一个实际问题是：我现在的环境里，谁在帮我建构动机？我的信息源、我常读的人、我对话的对象——这些构成的"关系场"可能在无形中决定了我明天的注意力会落在哪。也许值得偶尔回头看一下：我现在在做的事，到底是我"决定"要做的，还是我所在的系统帮我"默认勾选"的。不是要否定外部影响——你永远无法脱离环境做选择——但至少可以知道哪些选择是自己在开，哪些是系统在帮你自动驾驶。
          - paragraph [ref=e183]:
            - link "The overlooked brain system shaping our motivations" [ref=e184] [cursor=pointer]:
              - /url: https://bigthink.com/neuropsychology/social-brain-motivation/
          - heading "四、📦 GitHub 今日新星" [level=2] [ref=e185]
          - heading "mvanhorn / last30days-skill" [level=3] [ref=e186]
          - paragraph [ref=e187]: AI agent skill，能跨 Reddit、X、YouTube、HN、Polymarket 和全网做研究主题，然后合成一份有据可查的总结。本质上是 Hermes 生态里的"调研外挂"——你想知道某个话题最近 30 天在哪些平台吵了什么，让它跑一圈就行。刚火起来的原因是 agent 生态在快速成熟，这种"给 agent 喂得过去的工具"比"通用 AI"更贴近实际需求。
          - paragraph [ref=e188]:
            - link "GitHub" [ref=e189] [cursor=pointer]:
              - /url: https://github.com/mvanhorn/last30days-skill
            - text: · 34,474 ★（+3,558）
          - heading "Panniantong / Agent-Reach" [level=3] [ref=e190]
          - paragraph [ref=e191]: “Ai agent 的眼睛”——一套 CLI 工具，让你的 agent 能读和搜 Twitter、Reddit、YouTube、GitHub、Bilibili、小红书。核心卖点是零 API 费用，agent 直接去网页拿数据。这比调用平台官方的付费 API 便宜得多，而且覆盖了国内平台（B站、小红书），对出海和做中文内容的 agent 开发者来说很有吸引力。增长这么快（24k+ stars）说明大家确实被 API 账单逼急了。
          - paragraph [ref=e192]:
            - link "GitHub" [ref=e193] [cursor=pointer]:
              - /url: https://github.com/Panniantong/Agent-Reach
            - text: · 24,080 ★（+679）
          - heading "refactoringhq / tolaria" [level=3] [ref=e194]
          - paragraph [ref=e195]: 桌面级 Markdown 知识库管理工具。不是又一个 Notion 替代品，而是定位在 Obsidian 和 Logseq 之间的"轻量+好用"位置。用 Electron 做的跨平台应用，最近更新的版本加了双向链接和图谱视图。对于还没完全迁移到 Obsidian 或者觉得 Obsidian 太重的人来说，tolaria 的上手成本更低。
          - paragraph [ref=e196]:
            - link "GitHub" [ref=e197] [cursor=pointer]:
              - /url: https://github.com/refactoringhq/tolaria
            - text: · 13,559 ★（+651）
          - heading "RyanCodrai / turbovec" [level=3] [ref=e198]
          - paragraph [ref=e199]: 基于 TurboQuant 的向量索引库，Rust 写核心、Python 绑接口。如果你在 CPU 上跑向量搜索（没有 GPU），TurboQuant 的量化方法比 FAISS 的内存效率高不少。适合 edge device 或者低配服务器做语义搜索的场景。
          - paragraph [ref=e200]:
            - link "GitHub" [ref=e201] [cursor=pointer]:
              - /url: https://github.com/RyanCodrai/turbovec
            - text: · 8,828 ★（+1,729）
