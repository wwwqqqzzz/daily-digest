          - heading "一、💡 冷知识" [level=2] [ref=e32]
          - heading "“Bug” 这个词的诞生比计算机还早" [level=3] [ref=e33]
          - paragraph [ref=e34]: 我们今天说的程序 bug，最早真的是一只虫子。
          - paragraph [ref=e35]: 1947 年 9 月 9 日，哈佛 Mark II 计算机的工程师们在继电器里发现了一只飞蛾，卡在了第 70 号继电器里。操作员 Grace Hopper（后来成为海军准将、COBOL 语言之母）把这只飞蛾贴在日志里，并写下了 “First actual case of bug being found”。
          - paragraph [ref=e36]:
            - text: 但有意思的是：
            - strong [ref=e37]: “bug” 这个词在工程领域用了几十年了。
            - text: 早在 1878 年，爱迪生就在一封信里写过 “bugs” 来指代技术故障：“This thing has its bugs.” 比 Hopper 早 69 年。Grace Hopper 只是给了 “bug” 一个物理形态——那只还在 Smithsonian 博物馆展出的飞蛾。
          - paragraph [ref=e38]: 而 “debugging” 这个词，也不是 Hopper 发明的。早在 1945 年，她就用过 “debugging” 来描述排除故障的过程。到 1950 年代，IBM 正式把它收进了工程术语里。
          - paragraph [ref=e39]:
            - text: 所以下次你
            - code [ref=e40]: console.log('debugging')
            - text: 的时候，可以想一下：这行代码背后真的有一只飞蛾。
