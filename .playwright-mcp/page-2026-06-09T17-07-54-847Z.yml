            - paragraph [ref=e73]: "[!tip] 简介 Browserbase 出品的开放浏览器技能目录，让 AI agent 像人有肌肉记忆一样\"记住\"怎么做网页任务。"
          - paragraph [ref=e74]: 如果你在用 AI agent 做网页自动化，最大的痛点是每次都要教 agent 怎么做——登录、填表、翻页，每个网站都不一样。Browse.sh 提供了一个技能集市，你的 agent 能从里面直接拿已经调好的"动作序列"。
          - paragraph [ref=e75]: Browserbase 本身是做云端浏览器基础设施的团队，之前在 YC 出来的。Browse.sh 相当于是把他们在自动化过程中沉淀下来的可复用模版开放出来。Heremes Agent 已经接入了这个 hub，Hermes 用户可以直接调用 Browse.sh 的浏览器技能。对于做 agent 工作流的开发者来说，这省掉了很多"教 agent 点哪个按钮"的体力活。
          - paragraph [ref=e76]: 相比传统的 Puppeteer/Playwright 脚本，Browse.sh 的优势是 agent 感知——你的 agent 能自己判断哪个技能适用，不需要你手动写操作代码。缺点是它依赖 Browserbase 的运行时环境，不适合需要完全自托管控制的场景。如果你是重度 agent 用户，这个值得留意——它本质上是在降低 agent 理解真实网页的摩擦。
